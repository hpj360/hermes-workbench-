<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Workbench</title>
<style>
  :root {
    --bg: #080809;
    --bg-elev: #0d0d10;
    --card: rgba(255,255,255,0.03);
    --card-hover: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #e0e0e0;
    --text-2: #8b8b8b;
    --text-3: #5a5a5a;
    --accent: #6366f1;
    --accent-2: #8b5cf6;
    --grad: linear-gradient(135deg, #6366f1, #8b5cf6);
    --green: #10b981;
    --blue: #3b82f6;
    --red: #ef4444;
    --orange: #f59e0b;
    --gray: #6b7280;
    --r-card: 12px;
    --r-btn: 8px;
    --r-badge: 999px;
    --glow: 0 0 20px rgba(99,102,241,0.15);
    --mono: 'SF Mono', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(99,102,241,0.06), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(139,92,246,0.05), transparent 60%);
    pointer-events: none; z-index: 0;
  }

  /* ===== Layout ===== */
  .app {
    display: grid;
    grid-template-rows: 48px 1fr 32px;
    height: 100vh;
    position: relative; z-index: 1;
  }

  /* ===== Top Bar ===== */
  .topbar {
    display: flex; align-items: center;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,16,0.85);
    backdrop-filter: blur(8px);
    gap: 16px;
  }
  .brand {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 14px;
    letter-spacing: 0.2px;
  }
  .brand .logo {
    width: 22px; height: 22px;
    display: grid; place-items: center;
    background: var(--grad);
    border-radius: 6px;
    box-shadow: var(--glow);
    color: #fff; font-size: 13px;
  }
  .topbar .spacer { flex: 1; }
  .conn {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-2);
  }
  .conn .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px rgba(16,185,129,0.6);
  }
  .conn.demo .dot { background: var(--orange); box-shadow: 0 0 8px rgba(245,158,11,0.6); }
  .conn.live .dot { background: var(--green); box-shadow: 0 0 8px rgba(16,185,129,0.6); animation: pulse 2s infinite; }
  .conn.error .dot { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.6); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .kbd {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 8px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    font-size: 11px; color: var(--text-2);
    cursor: pointer;
    transition: all .15s;
  }
  .kbd:hover { border-color: var(--border-strong); color: var(--text); }
  .kbd kbd {
    font-family: var(--mono);
    background: rgba(255,255,255,0.06);
    padding: 1px 5px; border-radius: 4px;
    font-size: 10px;
  }
  .icon-btn {
    width: 28px; height: 28px;
    display: grid; place-items: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--r-btn);
    color: var(--text-2);
    cursor: pointer;
    transition: all .15s;
    font-size: 14px;
  }
  .icon-btn:hover { background: var(--card); border-color: var(--border); color: var(--text); }

  /* ===== Main area ===== */
  .main {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: 0;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    border-right: 1px solid var(--border);
    background: rgba(13,13,16,0.5);
    padding: 12px 8px;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .nav-section {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--text-3);
    padding: 12px 10px 6px;
    font-weight: 600;
  }
  .nav-section + .nav-section { border-top: 1px solid var(--border); margin-top: 8px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: var(--r-btn);
    color: var(--text-2);
    cursor: pointer;
    font-size: 13px;
    transition: all .15s;
    user-select: none;
    position: relative;
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active {
    background: rgba(99,102,241,0.12);
    color: var(--text);
    box-shadow: inset 0 0 0 1px rgba(99,102,241,0.25);
  }
  .nav-item.active::before {
    content: ''; position: absolute; left: -8px; top: 8px; bottom: 8px;
    width: 2px; background: var(--grad); border-radius: 2px;
  }
  .nav-item .ico { width: 16px; text-align: center; font-size: 14px; }
  .nav-item.disabled { opacity: 0.4; cursor: not-allowed; }
  .nav-item.disabled:hover { background: transparent; color: var(--text-2); }
  .nav-item .tag {
    margin-left: auto;
    font-size: 9px; padding: 1px 5px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--r-badge); color: var(--text-3);
  }

  /* ===== Content ===== */
  .content {
    overflow-y: auto;
    padding: 24px 28px;
    min-width: 0;
  }
  .page-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
    gap: 16px;
  }
  .page-title {
    font-size: 20px; font-weight: 600;
    letter-spacing: -0.3px;
  }
  .page-sub { color: var(--text-2); font-size: 13px; margin-top: 2px; }
  .page-actions { display: flex; gap: 8px; align-items: center; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
    font-family: inherit;
  }
  .btn:hover { background: var(--card-hover); border-color: var(--border-strong); }
  .btn.primary {
    background: var(--grad);
    border: none;
    color: #fff;
    box-shadow: var(--glow);
  }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.ghost { background: transparent; }
  .btn.danger { color: var(--red); border-color: rgba(239,68,68,0.3); }
  .btn.danger:hover { background: rgba(239,68,68,0.1); }
  .btn.sm { padding: 4px 8px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== Cards / panels ===== */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 16px;
    transition: border-color .15s, background .15s;
  }
  .card-title {
    font-size: 12px; font-weight: 600;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .actions { margin-left: auto; }

  .grid { display: grid; gap: 16px; }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }
  .grid-2 { grid-template-columns: 2fr 1fr; }
  .grid-2-eq { grid-template-columns: 1fr 1fr; }

  /* ===== Stat card ===== */
  .stat {
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all .2s;
  }
  .stat:hover {
    border-color: var(--border-strong);
    background: var(--card-hover);
    transform: translateY(-1px);
  }
  .stat .stat-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .stat .stat-ico {
    width: 30px; height: 30px;
    display: grid; place-items: center;
    background: rgba(99,102,241,0.1);
    border-radius: 8px;
    font-size: 15px;
  }
  .stat .stat-val {
    font-size: 26px; font-weight: 700;
    letter-spacing: -0.5px;
    font-family: var(--mono);
  }
  .stat .stat-label {
    color: var(--text-2); font-size: 12px;
    margin-top: 2px;
  }
  .stat .stat-trend {
    font-size: 11px; color: var(--green);
    margin-top: 6px;
  }

  /* ===== Badge ===== */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px;
    border-radius: var(--r-badge);
    font-size: 11px;
    font-weight: 500;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-2);
    white-space: nowrap;
  }
  .badge.prompt { color: #a78bfa; border-color: rgba(167,139,250,0.3); background: rgba(167,139,250,0.08); }
  .badge.python { color: #60a5fa; border-color: rgba(96,165,250,0.3); background: rgba(96,165,250,0.08); }
  .badge.shell { color: #34d399; border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.08); }
  .badge.node { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.08); }
  .badge.green { color: var(--green); border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.08); }
  .badge.blue { color: var(--blue); border-color: rgba(59,130,246,0.3); background: rgba(59,130,246,0.08); }
  .badge.red { color: var(--red); border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }
  .badge.orange { color: var(--orange); border-color: rgba(245,158,11,0.3); background: rgba(245,158,11,0.08); }
  .badge.gray { color: var(--text-2); border-color: var(--border); background: var(--card); }
  .badge.dot::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: currentColor;
  }

  /* ===== Inputs ===== */
  .input, .textarea, .select {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    padding: 8px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    transition: border-color .15s;
  }
  .input:focus, .textarea:focus, .select:focus {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  .textarea { resize: vertical; min-height: 70px; font-family: var(--mono); }
  .input::placeholder, .textarea::placeholder { color: var(--text-3); }
  .field { margin-bottom: 12px; }
  .field label {
    display: block; font-size: 11px; color: var(--text-2);
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.6px;
  }

  /* ===== Tabs ===== */
  .tabs {
    display: flex; gap: 2px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .tab {
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-2);
    cursor: pointer;
    border: none; background: transparent;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all .15s;
    font-family: inherit;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab .count {
    margin-left: 6px; font-size: 11px;
    color: var(--text-3);
  }

  /* ===== Filter chips ===== */
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    padding: 5px 11px;
    border-radius: var(--r-badge);
    background: var(--card);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-2);
    cursor: pointer;
    transition: all .15s;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.active {
    background: rgba(99,102,241,0.12);
    border-color: rgba(99,102,241,0.4);
    color: var(--text);
  }

  /* ===== Skill cards ===== */
  .skill-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .skill-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 14px;
    cursor: pointer;
    transition: all .15s;
  }
  .skill-card:hover { border-color: rgba(99,102,241,0.4); background: var(--card-hover); }
  .skill-card.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .skill-card .row1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .skill-card .name { font-weight: 600; font-size: 14px; font-family: var(--mono); }
  .skill-card .desc { color: var(--text-2); font-size: 12px; line-height: 1.45; }
  .skill-card .meta { display: flex; gap: 6px; margin-top: 10px; font-size: 11px; color: var(--text-3); }

  .detail-panel {
    margin-top: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    overflow: hidden;
  }
  .detail-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-head .title { font-weight: 600; font-family: var(--mono); }
  .detail-body { padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px 12px; font-size: 12px; }
  .kv .k { color: var(--text-2); }
  .kv .v { color: var(--text); font-family: var(--mono); word-break: break-all; }
  .run-panel { border-top: 1px solid var(--border); padding: 16px; background: rgba(0,0,0,0.2); }
  .run-output {
    margin-top: 12px;
    background: #050507;
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    padding: 10px;
    font-family: var(--mono);
    font-size: 12px;
    color: #a3e635;
    min-height: 60px;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 240px;
    overflow-y: auto;
  }
  .run-output.empty { color: var(--text-3); }

  /* ===== Memory list ===== */
  .fact-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    background: var(--card);
    margin-bottom: 8px;
    transition: all .15s;
  }
  .fact-row:hover { border-color: var(--border-strong); }
  .fact-row .key { font-family: var(--mono); color: var(--accent-2); font-size: 13px; min-width: 0; flex-shrink: 0; }
  .fact-row .sep { color: var(--text-3); }
  .fact-row .val { font-family: var(--mono); color: var(--text); font-size: 13px; flex: 1; word-break: break-all; }
  .fact-row .del { opacity: 0; transition: opacity .15s; }
  .fact-row:hover .del { opacity: 1; }

  .episode {
    display: flex; gap: 12px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    background: var(--card);
    margin-bottom: 8px;
    cursor: pointer;
    transition: all .15s;
  }
  .episode:hover { border-color: var(--border-strong); background: var(--card-hover); }
  .episode .ico {
    width: 30px; height: 30px; flex-shrink: 0;
    display: grid; place-items: center;
    background: rgba(99,102,241,0.1);
    border-radius: 8px; font-size: 14px;
  }
  .episode .body { flex: 1; min-width: 0; }
  .episode .top { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .episode .summary { font-size: 13px; color: var(--text); }
  .episode .time { font-size: 11px; color: var(--text-3); font-family: var(--mono); }
  .episode .expand { display: none; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-2); font-family: var(--mono); white-space: pre-wrap; }
  .episode.open .expand { display: block; }

  /* ===== Tasks ===== */
  .task-card {
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    background: var(--card);
    padding: 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: all .15s;
  }
  .task-card:hover { border-color: var(--border-strong); }
  .task-card.selected { border-color: var(--accent); }
  .task-card .top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .task-card .id { font-family: var(--mono); font-weight: 600; font-size: 13px; }
  .task-card .time { margin-left: auto; font-size: 11px; color: var(--text-3); font-family: var(--mono); }
  .step-chain { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .step-pill {
    padding: 3px 9px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: var(--r-badge);
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-2);
  }
  .step-arrow { color: var(--text-3); font-size: 11px; }

  .round {
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    padding: 10px 12px;
    margin-bottom: 8px;
    background: rgba(0,0,0,0.2);
  }
  .round .rh { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .round .rs { font-family: var(--mono); color: var(--text-2); font-size: 12px; }

  .step-builder {
    border: 1px dashed var(--border-strong);
    border-radius: var(--r-btn);
    padding: 10px;
    margin-bottom: 8px;
    display: grid; grid-template-columns: 180px 1fr auto; gap: 8px; align-items: center;
  }
  .step-builder .rm { cursor: pointer; color: var(--text-3); }
  .step-builder .rm:hover { color: var(--red); }

  /* ===== Registry ===== */
  .source-card {
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    background: var(--card);
    padding: 14px;
    display: flex; align-items: center; gap: 14px;
    transition: all .15s;
  }
  .source-card:hover { border-color: var(--border-strong); }
  .source-card .sico {
    width: 38px; height: 38px;
    display: grid; place-items: center;
    background: rgba(99,102,241,0.1);
    border-radius: 10px; font-size: 17px;
  }
  .source-card .sbody { flex: 1; }
  .source-card .sname { font-weight: 600; font-size: 14px; }
  .source-card .smeta { font-size: 12px; color: var(--text-2); margin-top: 2px; }

  table.matrix {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.matrix th, table.matrix td {
    padding: 9px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  table.matrix th {
    font-weight: 600; color: var(--text-2);
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  }
  table.matrix td.skill-name { font-family: var(--mono); }
  table.matrix td.check { text-align: center; font-size: 15px; }
  table.matrix .yes { color: var(--green); }
  table.matrix .no { color: var(--text-3); }
  table.matrix tr:hover { background: var(--card); }

  .agent-row, .doc-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--r-btn);
    background: var(--card);
    margin-bottom: 8px;
  }
  .agent-row:hover, .doc-row:hover { border-color: var(--border-strong); }
  .agent-row .ico, .doc-row .ico {
    width: 28px; height: 28px; display: grid; place-items: center;
    background: rgba(99,102,241,0.1); border-radius: 7px; font-size: 13px;
  }
  .agent-row .nm, .doc-row .nm { font-weight: 500; font-family: var(--mono); font-size: 13px; }
  .agent-row .src, .doc-row .src { margin-left: auto; font-size: 11px; color: var(--text-3); font-family: var(--mono); }

  /* ===== Profile / JSON ===== */
  .json-view {
    background: #050507;
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 16px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre;
  }
  .json-edit {
    width: 100%; min-height: 380px;
    background: #050507;
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 16px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.6;
    color: var(--text);
    resize: vertical;
  }
  .json-edit:focus { outline: none; border-color: var(--accent); }
  .jk { color: #a78bfa; }
  .js { color: #34d399; }
  .jn { color: #fbbf24; }

function normalizeApiResponse(path, data) {
  // Extract arrays from wrapper objects returned by real API
  if (path === '/skills' && Array.isArray(data.skills)) return data.skills;
  if (path === '/memory/facts' && Array.isArray(data.facts)) return data.facts;
  if (path.startsWith('/memory/episodes') && Array.isArray(data.episodes)) {
    return data.episodes.map(e => ({
      ...e,
      ts: e.created_at ? new Date(e.created_at * 1000).toISOString() : e.ts,
      detail: e.details ? (typeof e.details === 'string' ? e.details : JSON.stringify(e.details, null, 2)) : e.detail
    }));
  }
  if (path === '/tasks' && Array.isArray(data.tasks)) return data.tasks;
  if (path === '/registry/sources' && Array.isArray(data.sources)) return data.sources;
  if (path === '/registry/skills' && Array.isArray(data.skills)) return data.skills;
  if (path === '/registry/agents' && Array.isArray(data.agents)) return data.agents;
  if (path === '/registry/knowledge' && Array.isArray(data.knowledge)) return data.knowledge;
  if (path === '/workflows' && Array.isArray(data.workflows)) return data.workflows;
  if (path === '/triggers' && Array.isArray(data.triggers)) return data.triggers;
  if (path === '/projects' && Array.isArray(data.projects)) return data.projects;
  if (path.includes('/executions') && Array.isArray(data.executions)) return data.executions;
  if (path === '/projects/summary' && data && typeof data === 'object') return data;
  return data;
}

/* ---------- API client with mock fallback ---------- */
function authHeaders() {
  const h = { 'Accept': 'application/json' };
  const token = localStorage.getItem('hermes_token');
  if (token) h['Authorization'] = 'Bearer ' + token;
  return h;
}
async function api(path, opts = {}) {
  const method = (opts.method || 'GET').toUpperCase();
  if (DEMO_MODE && method === 'GET') {
    await new Promise(r => setTimeout(r, 280 + Math.random() * 220)); // simulate latency
    const d = MOCK[path];
    if (d === undefined) return { error: 'no mock', demo: true };
    return JSON.parse(JSON.stringify(d));
  }
  try {
    const fetchOpts = { method, headers: { 'Content-Type': 'application/json', ...authHeaders() } };
    if (opts.body !== undefined) fetchOpts.body = JSON.stringify(opts.body);
    const res = await fetch(path, fetchOpts);
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error(errBody.error || `HTTP ${res.status}`);
    }
    const data = await res.json();
    return normalizeApiResponse(path, data);
  } catch (e) {
    if (method !== 'GET') throw e; // POST/PUT/DELETE 不回退 mock
    const mock = MOCK[path];
    if (mock !== undefined) return JSON.parse(JSON.stringify(mock));
    return { error: 'offline', demo: true };
  }
}

/* ---------- Helpers ---------- */
const $ = (sel, root = document) => root.querySelector(sel);
const el = (tag, cls, html) => { const e = document.createElement(tag); if (cls) e.className = cls; if (html != null) e.innerHTML = html; return e; };
const fmtTime = (iso) => {
  const d = new Date(iso);
  const now = new Date('2026-07-24T10:10:00Z');
  const diff = (now - d) / 1000;
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  return Math.floor(diff/86400) + '天前';
};
const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- Components ---------- */
function Badge(text, color = 'gray', dot = false) {
  return `<span class="badge ${color} ${dot ? 'dot' : ''}">${esc(text)}</span>`;
}
function Skeleton(lines = 3) {
  let html = '';
  for (let i = 0; i < lines; i++) html += `<div class="skeleton sk-line ${i === lines-1 ? 'short' : ''}"></div>`;
  return html;
}
function EmptyState(icon, message) {
  return `<div class="empty"><div class="ico">${icon}</div><div class="msg">${esc(message)}</div></div>`;
}
function ErrorState(message, retry) {
  return `<div class="error-state"><div class="ico">⚠</div><div class="msg">${esc(message)}</div><button class="btn sm" onclick="${retry}">重试</button></div>`;
}
function Card(title, contentHtml, actionsHtml = '') {
  return `<div class="card"><div class="card-title">${esc(title)}<span class="actions">${actionsHtml}</span></div>${contentHtml}</div>`;
}

/* 防抖：延迟执行频繁调用的函数 */
const _debounceTimers = {};
function debounce(fn, delay = 200, key = fn.name || 'default') {
  return function(...args) {
    if (_debounceTimers[key]) clearTimeout(_debounceTimers[key]);
    _debounceTimers[key] = setTimeout(() => { fn.apply(null, args); delete _debounceTimers[key]; }, delay);
  };
}

function toast(message, type = 'info') {
  const t = el('div', 'toast ' + type);
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  t.innerHTML = `<span class="t-ico">${icons[type] || 'ℹ'}</span><span>${esc(message)}</span>`;
  $('#toastStack').appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .2s'; setTimeout(() => t.remove(), 200); }, 2600);
}

function modal(title, bodyHtml, footHtml = '') {
  $('#modalTitle').textContent = title;
  $('#modalBody').innerHTML = bodyHtml;
  $('#modalFoot').innerHTML = footHtml;
  $('#modalRoot').classList.add('open');
}
function closeModal() { $('#modalRoot').classList.remove('open'); }

/* ---------- JSON syntax highlight ---------- */
function highlightJson(obj) {
  const json = JSON.stringify(obj, null, 2);
  return esc(json)
    .replace(/(&quot;[^&]*?&quot;)(\s*):/g, '<span class="jk">$1</span>$2:')
    .replace(/:\s*(&quot;[^&]*?&quot;)/g, (m, s) => ': <span class="js">' + s + '</span>')
    .replace(/:\s*(true|false)/g, ': <span class="jb">$1</span>')
    .replace(/:\s*(-?\d+\.?\d*)/g, ': <span class="jn">$1</span>')
    .replace(/:\s*null/g, ': <span class="jn-null">null</span>');
}

/* ============================================================
 * Router
 * ============================================================ */
const routes = ['overview', 'skills', 'memory', 'tasks', 'registry', 'profile', 'orchestrate', 'hub', 'audit'];
let currentRoute = 'overview';
const routeState = {};

function router() {
  let hash = location.hash.slice(2);
  if (!hash || !routes.includes(hash)) hash = 'overview';
  currentRoute = hash;

  // active nav
  document.querySelectorAll('.nav-item[data-route]').forEach(n => {
    n.classList.toggle('active', n.dataset.route === hash);
  });

  // close mobile sidebar
  $('#sidebar').classList.remove('open');

  render(hash);
}

async function render(route) {
  const content = $('#content');
  content.innerHTML = `<div class="page">${Skeleton(5)}<div class="skeleton sk-block"></div></div>`;

  try {
    switch (route) {
      case 'overview': await renderOverview(); break;
      case 'skills': await renderSkills(); break;
      case 'memory': await renderMemory(); break;
      case 'tasks': await renderTasks(); break;
      case 'registry': await renderRegistry(); break;
      case 'profile': await renderProfile(); break;
      case 'orchestrate': await renderOrchestrate(); break;
      case 'hub': await renderHub(); break;
      case 'audit': await renderAudit(); break;
    }
  } catch (e) {
    content.innerHTML = `<div class="page">${ErrorState('加载失败: ' + e.message, 'render(\''+route+'\')')}</div>`;
  }
}

 * Page: Overview
 * ============================================================ */
async function renderOverview() {
  // Compose overview from multiple API calls (with mock fallback)
  const [health, skills, facts, episodes, tasks, sources] = await Promise.all([
    api('/health'), api('/skills'), api('/memory/facts'), api('/memory/episodes'), api('/tasks'), api('/registry/sources')
  ]);

  // If all calls failed, show error
  if (health.error && skills.error) {
    $('#content').innerHTML = `<div class="page">${ErrorState('无法连接到 API', 'render(\'overview\')')}</div>`;
    return;
  }

  // Build composite data structure matching the render template
  const data = {
    stats: {
      skills: health.skills_total || (Array.isArray(skills) ? skills.length : 0),
      memory: Array.isArray(facts) ? facts.length : 0,
      tasks: Array.isArray(tasks) ? tasks.length : 0,
      sources: Array.isArray(sources) ? sources.length : 0
    },
    health: {
      api: { status: health.status || 'ok', latency: 0 },
      skills: { ready: health.skills_ready || 0, total: health.skills_total || (Array.isArray(skills) ? skills.length : 0) },
      memory_layers: [
        { layer: 'L1', name: 'Facts', count: Array.isArray(facts) ? facts.length : 0 },
        { layer: 'L2', name: 'Episodes', count: Array.isArray(episodes) ? episodes.length : 0 },

let skillsData = [];
let skillsFilter = { q: '', runtime: 'all', selected: null };

async function renderSkills() {
  const data = await api('/skills');
  if (data.error) { $('#content').innerHTML = `<div class="page">${ErrorState(data.error, 'render(\'skills\')')}</div>`; return; }
  skillsData = data;
  drawSkills();
}

function drawSkills() {
  const runtimes = ['all', 'prompt', 'python', 'shell', 'node'];
  const runtimeLabels = { all: '全部', prompt: '提示词', python: 'Python', shell: 'Shell', node: 'Node' };
  const filtered = skillsData.filter(s => {
    if (skillsFilter.runtime !== 'all' && s.runtime !== skillsFilter.runtime) return false;
    if (skillsFilter.q) {
      const q = skillsFilter.q.toLowerCase();
      if (!s.name.toLowerCase().includes(q) && !s.description.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const cards = filtered.length ? filtered.map(s => `
    <div class="skill-card ${skillsFilter.selected === s.name ? 'selected' : ''}" onclick="selectSkill('${s.name}')">
      <div class="row1">
        <span class="name">${esc(s.name)}</span>
        ${Badge(s.runtime, s.runtime)}
      </div>
      <div class="desc">${esc(s.description)}</div>
      <div class="meta"><span>${esc(s.path)}</span></div>
    </div>
  `).join('') : EmptyState('🔍', '没有匹配的技能');

  const detail = skillsFilter.selected ? renderSkillDetail(skillsData.find(s => s.name === skillsFilter.selected)) : '';

  $('#content').innerHTML = `
    <div class="page">
      <div class="page-head">
        <div>
          <div class="page-title">技能</div>
          <div class="page-sub">浏览、检查并运行已注册的技能。</div>
        </div>
      </div>
      <div class="field" style="margin-bottom:12px;">
        <input class="input" id="skillSearch" placeholder="按名称或描述搜索技能..." value="${esc(skillsFilter.q)}" oninput="onSkillSearch(this.value)" />
      </div>
      <div class="chips" style="margin-bottom:16px;">
        ${runtimes.map(r => `<button class="chip ${skillsFilter.runtime === r ? 'active' : ''}" onclick="setSkillRuntime('${r}')">${runtimeLabels[r]}</button>`).join('')}
      </div>
      <div class="skill-grid">${cards}</div>
      ${detail}
    </div>
  `;
}

function onSkillSearch(v) { skillsFilter.q = v; debounce(drawSkills, 200)(); }
function setSkillRuntime(r) { skillsFilter.runtime = r; drawSkills(); }
function selectSkill(name) { skillsFilter.selected = skillsFilter.selected === name ? null : name; drawSkills(); }

function renderSkillDetail(s) {
  return `
    <div class="detail-panel">
      <div class="detail-head">
        <span class="title">${esc(s.name)}</span>
        <button class="icon-btn" onclick="selectSkill('${s.name}')">✕</button>
      </div>
      <div class="detail-body">
        <div>
          <div class="kv">
            <span class="k">name</span><span class="v">${esc(s.name)}</span>
            <span class="k">path</span><span class="v">${esc(s.path)}</span>
            <span class="k">runtime</span><span class="v">${Badge(s.runtime, s.runtime)}</span>
            <span class="k">entrypoint</span><span class="v">${esc(s.entrypoint)}</span>
            <span class="k">requires_bins</span><span class="v">${s.requires_bins.length ? s.requires_bins.map(b => `<span class="badge gray">${esc(b)}</span>`).join(' ') : '—'}</span>
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;">描述</div>
          <div style="font-size:13px;color:var(--text);line-height:1.6;">${esc(s.description)}</div>
        </div>
      </div>
      <div class="run-panel">
        <div style="font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">运行</div>
        <div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;">
          <input class="input" id="runArgs-${s.name}" placeholder='参数，例如 --ticker AAPL' />
          <button class="btn primary" onclick="runSkill('${s.name}')">▶ 执行</button>
        </div>
        <div class="run-output empty" id="runOut-${s.name}">输出将显示在此处。</div>
      </div>
    </div>
  `;
}

async function runSkill(name) {
  const args = $(`#runArgs-${name}`).value.trim();
  const out = $(`#runOut-${name}`);
  out.classList.remove('empty');
  out.textContent = '$ 正在执行 ' + name + (args ? ' ' + args : '') + ' ...\n';

  // Try real API first
  try {
    const argList = args ? args.split(/\s+/) : [];
    const res = await fetch(`/skills/${name}/run`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ args: argList })
    });
    if (res.ok) {
      const result = await res.json();
      out.textContent += (result.stdout || '') + (result.stderr ? '\n[stderr] ' + result.stderr : '');
      out.textContent += `\n✓ 执行完成 (退出码: ${result.exit_code}, 耗时: ${result.duration.toFixed(2)}s)`;
      toast('技能 ' + name + ' 已执行', result.ok ? 'success' : 'error');
      return;
    }
  } catch (e) { /* fall through to mock */ }

  // Fallback: mock execution
  let i = 0;
  const lines = [
    '[演示] 正在加载技能清单...',
    '[演示] runtime: ' + (skillsData.find(s=>s.name===name)||{}).runtime,
    '[演示] 参数已解析: ' + (args || '(无)'),
    '[演示] ✓ 执行完成 (模拟)',
    '[演示] 结果: { "ok": true, "duration_ms": ' + (200 + Math.floor(Math.random()*800)) + ' }'
  ];
  const tick = () => {
    if (i < lines.length) { out.textContent += lines[i++] + '\n'; out.scrollTop = out.scrollHeight; setTimeout(tick, 220); }
  };
  tick();
  toast('技能 ' + name + ' 已执行 (模拟)', 'success');
}

    { id: 'episodes', label: '事件', count: memoryData.episodes.length, sub: 'L2' },

  let body = '';
  if (memoryTab === 'facts') {

      <div class="fact-row">

    `;
  } else if (memoryTab === 'episodes') {
    const kinds = ['all', 'loop', 'fact', 'task'];
    const kindLabels = { all: '全部', loop: 'loop', fact: 'fact', task: 'task' };
    const filtered = memoryData.episodes.filter(e => episodeFilter === 'all' || e.kind === episodeFilter);
    const icons = { loop: '🔄', fact: '📝', task: '📋' };

      <div class="episode" onclick="this.classList.toggle('open')">
        <div class="ico">${icons[e.kind] || '•'}</div>
        <div class="body">
          <div class="top">${Badge(e.kind, 'blue')} <span class="time">${fmtTime(e.ts)}</span></div>
          <div class="summary">${esc(e.summary)}</div>

      <div class="chips" style="margin-bottom:14px;">

      </div>
      ${list || EmptyState('∅', '暂无记录的事件')}

    <div class="page">

}

function setMemoryTab(t) { memoryTab = t; drawMemory(); }
function setEpisodeFilter(k) { episodeFilter = k; drawMemory(); }
function addFact() {
  const k = $('#factKey').value.trim();
  const v = $('#factValue').value.trim();

}
function deleteFact(key) {
  memoryData.facts = memoryData.facts.filter(f => f.key !== key);
  toast('事实已删除', 'info');
  drawMemory();
}

 * Page: Tasks
 * ============================================================ */
let tasksData = [];
let selectedTask = null;
let newTaskSteps = [{ skill: '', args: '' }];
let newTaskMode = 'oneshot';

async function renderTasks() {
  const data = await api('/tasks');
  if (data.error) { $('#content').innerHTML = `<div class="page">${ErrorState(data.error, 'render(\'tasks\')')}</div>`; return; }
  tasksData = data;
  drawTasks();
}

function drawTasks() {
  const statusColor = { PENDING: 'gray', RUNNING: 'blue', COMPLETED: 'green', FAILED: 'red', CANCELLED: 'orange' };
  const statusLabels = { PENDING: '等待中', RUNNING: '运行中', COMPLETED: '已完成', FAILED: '失败', CANCELLED: '已取消' };
  const modeLabels = { oneshot: '单次', recurring: '循环' };
  const list = tasksData.map(t => `
    <div class="task-card ${selectedTask === t.task_id ? 'selected' : ''}" onclick="selectTask('${t.task_id}')">
      <div class="top">
        <span class="id">${esc(t.task_id)}</span>
        ${Badge(modeLabels[t.mode] || t.mode, t.mode === 'recurring' ? 'orange' : 'gray')}
        ${Badge(statusLabels[t.status] || t.status, statusColor[t.status] || 'gray', true)}
        <span class="time">${fmtTime(t.created_at)}</span>
      </div>
      <div class="step-chain">
        ${t.steps.map((s, i) => `<span class="step-pill">${esc(s)}</span>${i < t.steps.length-1 ? '<span class="step-arrow">→</span>' : ''}`).join('')}
        ${t.mode === 'recurring' ? `<span class="step-pill" style="margin-left:auto;">每 ${t.interval}s · ${t.max_runs}x</span>` : ''}
      </div>
    </div>
  `).join('');

  const skillsOpts = MOCK['/skills'].map(s => s.name);
  const builder = newTaskSteps.map((st, i) => `
    <div class="step-builder">
      <select class="select" onchange="updateStep(${i}, 'skill', this.value)">
        <option value="">选择技能...</option>
        ${skillsOpts.map(n => `<option value="${n}" ${st.skill === n ? 'selected' : ''}>${n}</option>`).join('')}
      </select>
      <input class="input" placeholder="参数（可选）" value="${esc(st.args)}" oninput="updateStep(${i}, 'args', this.value)" />
      <span class="rm" onclick="removeStep(${i})" title="移除">✕</span>
    </div>
  `).join('');

  const detail = selectedTask ? renderTaskDetail(tasksData.find(t => t.task_id === selectedTask)) : '';

  $('#content').innerHTML = `
    <div class="page">
      <div class="page-head">
        <div>
          <div class="page-title">任务</div>
          <div class="page-sub">调度和监控多步骤任务执行。</div>
        </div>
        <div class="page-actions">
          <button class="btn primary" onclick="addStep()">+ 添加步骤</button>
        </div>
      </div>
      <div class="grid grid-2-eq" style="margin-bottom:16px;">
        <div class="card">
          <div class="card-title">新建任务</div>
          ${builder}
          <div class="field" style="margin-top:8px;">
            <label>模式</label>
            <div class="chips">
              <button class="chip ${newTaskMode === 'oneshot' ? 'active' : ''}" onclick="setTaskMode('oneshot')">单次</button>
              <button class="chip ${newTaskMode === 'recurring' ? 'active' : ''}" onclick="setTaskMode('recurring')">循环</button>
            </div>
          </div>
          ${newTaskMode === 'recurring' ? `
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
              <div class="field" style="margin:0;"><label>间隔 (秒)</label><input class="input" id="ntInterval" type="number" value="300" /></div>
              <div class="field" style="margin:0;"><label>最大运行次数</label><input class="input" id="ntMaxRuns" type="number" value="6" /></div>
            </div>
          ` : ''}
          <button class="btn primary" onclick="createTask()">▶ 创建并运行</button>
        </div>
        <div class="card">
          <div class="card-title">任务 <span class="actions">${tasksData.length}</span></div>
          ${list || EmptyState('∅', '暂无任务')}
        </div>
      </div>
      ${detail}
    </div>
  `;
}

function renderTaskDetail(t) {
  const statusColor = { PENDING: 'gray', RUNNING: 'blue', COMPLETED: 'green', FAILED: 'red', CANCELLED: 'orange' };
  const statusLabels = { PENDING: '等待中', RUNNING: '运行中', COMPLETED: '已完成', FAILED: '失败', CANCELLED: '已取消' };
  const modeLabels = { oneshot: '单次', recurring: '循环' };
  const rounds = t.rounds.length ? t.rounds.map((r, i) => `
    <div class="round">
      <div class="rh">${Badge('轮次 ' + (i+1), 'gray')} ${Badge(r.ok ? '成功' : '失败', r.ok ? 'green' : 'red')} <span class="rs" style="margin-left:auto;">${r.duration}s</span></div>
      ${r.results.map(res => `<div class="rs">↳ ${esc(res.step)}: ${res.ok ? '✓' : '✕'} ${esc(res.output || '')} <span style="color:var(--text-3)">(${res.duration}s)</span></div>`).join('')}
      ${r.errors.length ? `<div class="rs" style="color:var(--red);">错误: ${r.errors.map(e=>esc(e)).join('; ')}</div>` : ''}
    </div>
  `).join('') : EmptyState('∅', '尚未执行任何轮次');

  const actions = t.status === 'RUNNING'
    ? `<button class="btn danger sm" onclick="cancelTask('${t.task_id}')">取消</button>`
    : t.status === 'PENDING'
    ? `<button class="btn primary sm" onclick="runTask('${t.task_id}')">运行</button>`
    : `<button class="btn sm" onclick="rerunTask('${t.task_id}')">重跑</button>`;

  return `
    <div class="detail-panel">
      <div class="detail-head">
        <span class="title">${esc(t.task_id)}</span>
        <div style="display:flex;gap:6px;align-items:center;">
          ${Badge(modeLabels[t.mode] || t.mode, t.mode === 'recurring' ? 'orange' : 'gray')}
          ${Badge(statusLabels[t.status] || t.status, statusColor[t.status] || 'gray', true)}
          ${actions}
          <button class="icon-btn" onclick="selectTask(null)">✕</button>
        </div>
      </div>
      <div class="detail-body" style="grid-template-columns:1fr;">
        <div class="kv" style="margin-bottom:12px;">
          <span class="k">created_at</span><span class="v">${esc(t.created_at)}</span>
          <span class="k">steps</span><span class="v">${t.steps.map(s=>esc(s)).join(' → ')}</span>
          ${t.mode === 'recurring' ? `<span class="k">interval</span><span class="v">${t.interval}s</span><span class="k">max_runs</span><span class="v">${t.max_runs}</span>` : ''}
          <span class="k">rounds</span><span class="v">${t.rounds.length}</span>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">执行轮次</div>
          ${rounds}
        </div>
      </div>
    </div>
  `;
}

function selectTask(id) { selectedTask = selectedTask === id ? null : id; if (id === null) selectedTask = null; drawTasks(); }
function addStep() { newTaskSteps.push({ skill: '', args: '' }); drawTasks(); }
function removeStep(i) { newTaskSteps.splice(i, 1); if (!newTaskSteps.length) newTaskSteps.push({ skill: '', args: '' }); drawTasks(); }
function updateStep(i, k, v) { newTaskSteps[i][k] = v; }
function setTaskMode(m) { newTaskMode = m; drawTasks(); }

async function createTask() {
  const steps = newTaskSteps.filter(s => s.skill).map(s => s.skill);
  if (!steps.length) { toast('请至少添加一个包含技能的步骤', 'error'); return; }
  const plan = newTaskSteps.filter(s => s.skill).map(s => ({ skill: s.skill, args: s.args ? s.args.split(/\s+/) : [] }));
  const mode = newTaskMode;
  const body = { plan, mode, run: true };
  if (mode === 'recurring') {
    body.interval = parseInt($('#ntInterval').value) || 300;
    body.max_runs = parseInt($('#ntMaxRuns').value) || 6;
  }

  // Try real API first
  try {
    const res = await fetch('/tasks', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify(body)
    });
    if (res.ok) {
      const task = await res.json();
      tasksData.unshift(task);
      newTaskSteps = [{ skill: '', args: '' }];
      toast('任务 ' + task.task_id + ' 已创建并启动', 'success');
      drawTasks();
      return;
    }
  } catch (e) { /* fall through to mock */ }

  // Fallback: mock creation
  const id = 't-' + (1043 + tasksData.length);
  const task = {
    task_id: id, mode: newTaskMode, status: 'RUNNING',
    steps, created_at: new Date().toISOString(),
    rounds: []
  };
  if (newTaskMode === 'recurring') {
    task.interval = parseInt($('#ntInterval').value) || 300;
    task.max_runs = parseInt($('#ntMaxRuns').value) || 6;
  }
  tasksData.unshift(task);
  newTaskSteps = [{ skill: '', args: '' }];
  toast('任务 ' + id + ' 已创建并启动 (模拟)', 'success');
  drawTasks();
  setTimeout(() => {
    task.status = 'COMPLETED';
    task.rounds.push({ ok: true, results: steps.map(s => ({ step: s, ok: true, output: '模拟输出', duration: 0.5 + Math.random() })), duration: 1.2, errors: [] });
    if (selectedTask === id) drawTasks();
    toast('任务 ' + id + ' 已完成 (模拟)', 'info');
  }, 1500);
}

function runTask(id) {
  const t = tasksData.find(x => x.task_id === id);
  if (!t) return;
  t.status = 'RUNNING';
  drawTasks();
  setTimeout(() => {
    t.status = 'COMPLETED';
    t.rounds.push({ ok: true, results: t.steps.map(s => ({ step: s, ok: true, output: '模拟输出', duration: 0.4 + Math.random() })), duration: 1.0, errors: [] });
    drawTasks();
    toast('任务 ' + id + ' 已完成 (模拟)', 'success');
  }, 1500);
}
function cancelTask(id) {
  const t = tasksData.find(x => x.task_id === id);
  if (t) { t.status = 'CANCELLED'; drawTasks(); toast('任务 ' + id + ' 已取消', 'info'); }
}
function rerunTask(id) {
  const t = tasksData.find(x => x.task_id === id);
  if (t) { t.status = 'RUNNING'; t.rounds = []; drawTasks(); setTimeout(() => runTask(id), 100); }
}

/* Compute layered DAG layout via topological levels */
function computeWfLayers(steps) {
  const layerMap = {};
  const remaining = [...steps];
  const layers = [];
  let guard = 0;
  while (remaining.length && guard++ < 100) {
    const layer = remaining.filter(s => (s.depends_on || []).every(d => layerMap[d] !== undefined));
    if (!layer.length) {
      // cycle or missing dep: dump rest as final layer
      layers.push(remaining.slice());
      remaining.forEach(s => layerMap[s.id] = layers.length - 1);
      remaining.length = 0;
      break;
    }
    layer.forEach(s => layerMap[s.id] = layers.length);
    layers.push(layer);
    layer.forEach(s => {
      const idx = remaining.indexOf(s);
      if (idx >= 0) remaining.splice(idx, 1);
    });
  }
  return layers;
}

function renderWfDag(steps) {
  if (!steps || !steps.length) return EmptyState('∅', '工作流没有步骤');
  const layers = computeWfLayers(steps);
  const cols = layers.map((layer, i) => {
    const colNodes = layer.map(s => `
      <div class="wf-node">
        <div class="nid">${esc(s.id)}</div>
        <div class="nsk">${esc(s.skill)}</div>
        ${s.args ? `<div class="nargs">${esc(s.args)}</div>` : ''}
      </div>
    `).join('');
    const arrow = i < layers.length - 1 ? '<div class="wf-arrow">→</div>' : '';
    return `<div class="wf-col"><div class="wf-layer-label">L${i + 1}</div>${colNodes}</div>${arrow}`;
  }).join('');
  return `<div class="wf-dag">${cols}</div>`;
}

async function createWorkflow() {
  const name = orchestrateState.newWfName.trim();
  if (!name) { toast('请填写工作流名称', 'error'); return; }
  const steps = orchestrateState.newWfSteps
    .map((s, i) => ({ id: 'step-' + (i + 1), skill: s.skill, args: s.args, depends_on: s.depends_on.slice() }))
    .filter(s => s.skill);
  if (!steps.length) { toast('请至少添加一个包含技能的步骤', 'error'); return; }
  // 依赖循环检测
  const stepIds = new Set(steps.map(s => s.id));
  for (const s of steps) {
    for (const dep of s.depends_on) {
      if (!stepIds.has(dep)) { toast(`步骤 ${s.id} 依赖了不存在的步骤: ${dep}`, 'error'); return; }
    }
  }

  const body = { name, description: orchestrateState.newWfDesc, steps };
  try {
    const wf = await api('/workflows', { method: 'POST', body });
    workflowsData.unshift(wf);
    resetWfForm();
    toast('工作流 ' + name + ' 已创建', 'success');
    drawOrchestrate();
  } catch (e) {
    toast('创建失败: ' + (e.message || e), 'error');
  }
}

async function executeWorkflow(id) {
  const wf = workflowsData.find(w => w.id === id);

  toast('工作流 ' + wf.name + ' 已触发执行', 'info');
  try {
    const res = await fetch(`/workflows/${id}/execute`, { method: 'POST', headers: authHeaders() });
    if (res.ok) {
      const exec = await res.json();
      if (!localExecutions[id]) localExecutions[id] = [];
      localExecutions[id].unshift(exec);
      toast('工作流执行已启动: ' + (exec.id || id), 'success');
      if (orchestrateState.execWorkflowId === id) { await reloadExecutions(); drawOrchestrate(); }
      return;
    }
  } catch (e) { /* fall through */ }

  // Mock execution
  const execId = 'exec-' + Math.random().toString(36).slice(2, 7);
  const exec = {
    id: execId,
    workflow_id: id,
    status: 'COMPLETED',
    started_at: new Date().toISOString(),
    duration: wf.steps.reduce((a, s) => a + (0.5 + Math.random()), 0),
    steps: wf.steps.map(s => ({
      id: s.id, skill: s.skill, ok: true,
      stdout: '[模拟输出] ' + s.skill + ' 执行成功',
      stderr: '',
      duration: 0.5 + Math.random()
    }))
  };
  if (!localExecutions[id]) localExecutions[id] = [];
  localExecutions[id].unshift(exec);
  toast('工作流执行完成 (模拟): ' + execId, 'success');
  if (orchestrateState.execWorkflowId === id) { await reloadExecutions(); drawOrchestrate(); }
}

      </div>
    `;
  }).join('') : EmptyState('∅', '暂无触发器');

  // Config inputs based on type
  let cfgHtml = '';
  if (orchestrateState.newTrgType === 'github') {
    cfgHtml = `
      <div class="field"><label>仓库 (repo)</label><input class="input" placeholder="owner/repo" value="${esc(orchestrateState.newTrgConfig.repo)}" oninput="orchestrateState.newTrgConfig.repo = this.value" /></div>
      <div class="field"><label>标签 (label)</label><input class="input" placeholder="review-ready" value="${esc(orchestrateState.newTrgConfig.label)}" oninput="orchestrateState.newTrgConfig.label = this.value" /></div>
    `;
  } else if (orchestrateState.newTrgType === 'cron') {
    cfgHtml = `
      <div class="field"><label>cron 表达式</label><input class="input" placeholder="0 9 * * 1-5" value="${esc(orchestrateState.newTrgConfig.schedule)}" oninput="orchestrateState.newTrgConfig.schedule = this.value" /></div>
    `;
  } else {
    cfgHtml = `
      <div class="field"><label>Webhook 密钥</label><input class="input" placeholder="webhook secret" value="${esc(orchestrateState.newTrgConfig.secret)}" oninput="orchestrateState.newTrgConfig.secret = this.value" /></div>
    `;
  }

  return `
    <div class="grid grid-2-eq">
      <div class="card">
        <div class="card-title">新建触发器</div>
        <div class="field">
          <label>工作流</label>
          <select class="select" onchange="orchestrateState.newTrgWorkflowId = this.value">
            <option value="">选择工作流...</option>
            ${workflowsData.map(w => `<option value="${w.id}" ${orchestrateState.newTrgWorkflowId === w.id ? 'selected' : ''}>${esc(w.name)} (${w.id})</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label>类型</label>
          <div class="chips">
            ${['github', 'cron', 'webhook'].map(t => `<button class="chip ${orchestrateState.newTrgType === t ? 'active' : ''}" onclick="setTrgType('${t}')">${typeLabel[t]}</button>`).join('')}
          </div>
        </div>
        ${cfgHtml}
        <button class="btn primary" onclick="createTrigger()">创建</button>
      </div>
      <div class="card">
        <div class="card-title">触发器 <span class="actions">${triggersData.length}</span></div>
        ${list}
      </div>
    </div>
  `;
}

function setTrgType(t) {
  orchestrateState.newTrgType = t;
  drawOrchestrate();
}

async function createTrigger() {
  const wfId = orchestrateState.newTrgWorkflowId;
  if (!wfId) { toast('请选择工作流', 'error'); return; }
  const type = orchestrateState.newTrgType;
  let config = {};
  if (type === 'github') {
    if (!orchestrateState.newTrgConfig.repo) { toast('请填写 repo', 'error'); return; }
    config = { repo: orchestrateState.newTrgConfig.repo, label: orchestrateState.newTrgConfig.label };
  } else if (type === 'cron') {
    if (!orchestrateState.newTrgConfig.schedule) { toast('请填写 cron 表达式', 'error'); return; }
    config = { schedule: orchestrateState.newTrgConfig.schedule };
  } else {
    config = { secret: orchestrateState.newTrgConfig.secret };
  }
  const body = { workflow_id: wfId, type, config, enabled: true };

  try {
    const trg = await api('/triggers', { method: 'POST', body });
    triggersData.unshift(trg);
    resetTrgForm();
    toast('触发器已创建', 'success');
    drawOrchestrate();
  } catch (e) {
    toast('创建失败: ' + (e.message || e), 'error');
  }
}

function resetTrgForm() {
  orchestrateState.newTrgWorkflowId = '';
  orchestrateState.newTrgType = 'cron';
  orchestrateState.newTrgConfig = { repo: '', label: '', schedule: '0 9 * * 1-5', secret: '' };
}

async function toggleTrigger(id) {
  const t = triggersData.find(x => x.id === id);
  if (!t) return;
  const next = !t.enabled;
  try {
    const res = await fetch(`/triggers/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ enabled: next })
    });
    if (res.ok) { t.enabled = next; drawOrchestrate(); toast('触发器已' + (next ? '启用' : '禁用'), 'info'); return; }
  } catch (e) { /* fall through */ }
  t.enabled = next;
  drawOrchestrate();
  toast('触发器已' + (next ? '启用' : '禁用') + ' (模拟)', 'info');
}

async function deleteTrigger(id) {
  try {
    await fetch(`/triggers/${id}`, { method: 'DELETE', headers: authHeaders() });
  } catch (e) { /* ignore */ }
  triggersData = triggersData.filter(t => t.id !== id);
  toast('触发器已删除', 'info');
  drawOrchestrate();
}

async function fireTrigger(id) {
  try {
    const r = await api(`/triggers/${encodeURIComponent(id)}/fire`, { method: 'POST', body: {} });
    toast(`触发成功: ${r.status === 'COMPLETED' ? '工作流已完成' : r.status}`, r.status === 'COMPLETED' ? 'success' : 'error');
    // 切换到执行历史 Tab 查看结果
    orchestrateState.tab = 'executions';
    drawOrchestrate();
  } catch (e) {
    toast(`触发失败: ${e.message || e}`, 'error');
  }
}

/* ----- Executions tab ----- */
function drawExecutionsTab() {
  const wfId = orchestrateState.execWorkflowId;
  const wf = workflowsData.find(w => w.id === wfId);
  const execs = executionsData;

  const statusColor = { RUNNING: 'blue', COMPLETED: 'green', FAILED: 'red', PENDING: 'gray' };
  const statusLabel = { RUNNING: '运行中', COMPLETED: '已完成', FAILED: '失败', PENDING: '等待中' };

  const list = execs.length ? execs.map(e => `
    <div class="task-card ${orchestrateState.selectedExecution === e.id ? 'selected' : ''}" onclick="selectExecution('${e.id}')">
      <div class="top">
        <span class="id">${esc(e.id)}</span>
        ${Badge(statusLabel[e.status] || e.status, statusColor[e.status] || 'gray', true)}
        <span class="time">${fmtTime(e.started_at)}</span>
      </div>
      <div class="step-chain">
        <span class="step-pill">耗时 ${e.duration.toFixed(1)}s</span>
        <span class="step-pill">${e.steps.length} 步</span>
      </div>
    </div>
  `).join('') : EmptyState('∅', '该工作流暂无执行记录');

  const detail = orchestrateState.selectedExecution ? renderExecutionDetail(execs.find(e => e.id === orchestrateState.selectedExecution)) : '';

  return `
    <div class="grid grid-2-eq" style="margin-bottom:16px;">
      <div class="card">
        <div class="field" style="margin:0 0 12px;">
          <label>选择工作流</label>
          <select class="select" onchange="selectExecWorkflow(this.value)">
            <option value="">-- 选择 --</option>
            ${workflowsData.map(w => `<option value="${w.id}" ${wfId === w.id ? 'selected' : ''}>${esc(w.name)} (${w.id})</option>`).join('')}
          </select>
        </div>
        ${wf ? `<div style="font-size:12px;color:var(--text-2);">已选: <span style="font-family:var(--mono);color:var(--text);">${esc(wf.name)}</span> · ${wf.steps.length} 步</div>` : ''}

function renderExecutionDetail(e) {
  if (!e) return '';
  const statusColor = { RUNNING: 'blue', COMPLETED: 'green', FAILED: 'red', PENDING: 'gray' };
  const statusLabel = { RUNNING: '运行中', COMPLETED: '已完成', FAILED: '失败', PENDING: '等待中' };
  const steps = e.steps.map(s => `
    <div class="exec-step">
      <div class="es-head">
        ${Badge(s.ok ? '✓ 成功' : '✕ 失败', s.ok ? 'green' : 'red', true)}
        <span class="es-name">${esc(s.id)} · ${esc(s.skill)}</span>
        <span class="es-dur">${s.duration.toFixed(2)}s</span>
      </div>
      ${s.stdout ? `<div class="es-out">${esc(s.stdout)}</div>` : ''}
      ${s.stderr ? `<div class="es-out err">${esc(s.stderr)}</div>` : ''}
    </div>
  `).join('');

  return `
    <div class="detail-panel">
      <div class="detail-head">
        <span class="title">${esc(e.id)} <span style="color:var(--text-3);font-size:11px;margin-left:8px;">wf: ${esc(e.workflow_id)}</span></span>
        <div style="display:flex;gap:6px;align-items:center;">
          ${Badge(statusLabel[e.status] || e.status, statusColor[e.status] || 'gray', true)}

        </div>
      </div>
      <div class="detail-body" style="grid-template-columns:1fr;">
        <div class="kv" style="margin-bottom:14px;">
          <span class="k">id</span><span class="v">${esc(e.id)}</span>
          <span class="k">workflow_id</span><span class="v">${esc(e.workflow_id)}</span>
          <span class="k">started_at</span><span class="v">${esc(e.started_at)}</span>
          <span class="k">duration</span><span class="v">${e.duration.toFixed(2)}s</span>
          <span class="k">status</span><span class="v">${esc(e.status)}</span>
        </div>
        <div>
          <div style="font-size:11px;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;">步骤执行结果</div>
          ${steps || EmptyState('∅', '没有步骤结果')}

async function selectExecWorkflow(id) {
  orchestrateState.execWorkflowId = id;
  orchestrateState.selectedExecution = null;
  await reloadExecutions();
  drawOrchestrate();
}
function selectExecution(id) {
  orchestrateState.selectedExecution = (orchestrateState.selectedExecution === id || id === null) ? null : id;
  drawOrchestrate();
}

/* ============================================================
 * Page: Hub (Phase 3)
 * ============================================================ */
let projectsData = [];
let projectsSummary = {};
let hubState = {
  selectedProject: null,
  newPrjName: '',
  newPrjType: 'filesystem',
  newPrjUrl: '',
  newPrjToken: '',
  syncAssetType: 'all'
};

async function renderHub() {
  const [projects, summary] = await Promise.all([api('/projects'), api('/projects/summary')]);
  projectsData = Array.isArray(projects) ? projects : [];
  projectsSummary = summary && !summary.error ? summary : { total: 0, connected: 0, disconnected: 0, total_skills: 0, total_agents: 0, total_knowledge: 0 };
  drawHub();
}

function drawHub() {
  const typeIcon = { filesystem: '📁', github: '🐙', api: '🌐' };
  const typeLabel = { filesystem: '本地文件系统', github: 'GitHub 仓库', api: '远程 API' };

  /* Section 1: Projects */
  const urlPlaceholder = {
    filesystem: '~/.hermes/skills',
    github: 'github.com/owner/repo',
    api: 'https://api.example.com/hermes'
  };
  const prjForm = `
    <div class="card">
      <div class="card-title">接入项目</div>
      <div class="field"><label>名称</label><input class="input" placeholder="例如 远程工作台" value="${esc(hubState.newPrjName)}" oninput="hubState.newPrjName = this.value" /></div>

        </div>
      </div>

    </div>
  `;

  const prjList = projectsData.length ? projectsData.map(p => `
    <div class="project-card" style="cursor:pointer;" onclick="selectProject('${p.id}')">
      <div class="pc-status ${p.status}" title="${p.status}"></div>
      <div style="font-size:18px;">${typeIcon[p.type] || '💾'}</div>
      <div class="pc-body">
        <div class="pc-name">${esc(p.name)} <span style="color:var(--text-3);font-size:11px;">${esc(p.id)}</span></div>

        <div>${p.status === 'connected' ? '已连接' : p.status === 'error' ? '错误' : '已断开'}</div>
        <div>同步 ${fmtTime(p.last_sync)}</div>
      </div>
      <button class="btn sm" onclick="event.stopPropagation();pingProject('${p.id}')" title="检测连接健康">检测</button>
    </div>
  `).join('') : EmptyState('∅', '尚未接入任何项目');

  /* Project detail */
  const prjDetail = hubState.selectedProject ? renderProjectDetail(projectsData.find(p => p.id === hubState.selectedProject)) : '';

  /* Section 2: Summary */
  const pct = projectsSummary.total ? Math.round(projectsSummary.connected / projectsSummary.total * 100) : 0;
  const summaryCards = [
    { val: projectsSummary.total, label: '项目总数', ico: '📡' },
    { val: projectsSummary.connected, label: '已连接', ico: '✓' },
    { val: projectsSummary.total_skills, label: '总技能数', ico: '▤' },
    { val: projectsSummary.total_agents, label: '总智能体数', ico: '🤖' }
  ].map(s => `
    <div class="card stat">
      <div class="stat-top"><div class="stat-ico">${s.ico}</div></div>
      <div class="stat-val">${s.val}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');

  /* Section 3: Cross-project operations */
  const connectedProjects = projectsData.filter(p => p.status === 'connected');
  const projectOpts = (sel) => connectedProjects.map(p => `<option value="${p.id}" ${sel === p.id ? 'selected' : ''}>${esc(p.name)}</option>`).join('');

  const crossOps = `
    <div class="card">
      <div class="card-title">跨项目操作</div>
      <div class="cross-ops">
        <div class="op-row">
          <span class="op-label">同步技能</span>
          <select class="select" id="opSkillSrc"><option value="">源项目...</option>${projectOpts('')}</select>
          <span class="op-arrow">→</span>
          <select class="select" id="opSkillDst"><option value="">目标项目...</option>${projectOpts('')}</select>
          <button class="btn primary" onclick="crossSyncSkills()">执行</button>
        </div>
        <div class="op-row">
          <span class="op-label">同步记忆</span>
          <select class="select" id="opMemSrc"><option value="">源项目...</option>${projectOpts('')}</select>
          <span class="op-arrow">→</span>
          <select class="select" disabled><option>本地</option></select>
          <button class="btn primary" onclick="crossSyncMemory()">执行</button>
        </div>
        <div class="op-row single">
          <span class="op-label">合并画像</span>
          <span style="color:var(--text-2);font-size:12px;">从所有已连接项目 (${connectedProjects.length}) 合并用户画像至本地</span>
          <button class="btn primary" onclick="crossMergeProfiles()">执行</button>

  $('#content').innerHTML = `
    <div class="page">

        <div class="page-actions">
          <button class="btn" onclick="renderHub()">↻ 刷新</button>
        </div>
      </div>

      <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin:8px 0 10px;">Section 1 · 接入项目</div>
      <div class="grid grid-2-eq" style="margin-bottom:16px;">
        ${prjForm}
        <div class="card">
          <div class="card-title">项目列表 <span class="actions">${projectsData.length}</span></div>
          ${prjList}
        </div>
      </div>
      ${prjDetail}

      <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px;">Section 2 · 汇总统计</div>
      <div class="grid grid-4" style="margin-bottom:16px;">${summaryCards}</div>
      <div class="card" style="margin-bottom:16px;">
        <div class="card-title">连接率</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="progress-bar" style="flex:1;"><div class="pb-fill" style="width:${pct}%"></div></div>
          <span style="font-family:var(--mono);font-size:13px;color:var(--text);">${projectsSummary.connected}/${projectsSummary.total} (${pct}%)</span>
        </div>
        <div style="margin-top:10px;font-size:12px;color:var(--text-2);">
          知识文档总计 <span style="color:var(--text);font-family:var(--mono);">${projectsSummary.total_knowledge || 0}</span> ·
          断开项目 <span style="color:var(--red);font-family:var(--mono);">${projectsSummary.disconnected || 0}</span>
        </div>
      </div>

      <div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin:8px 0 10px;">Section 3 · 跨项目操作</div>
      ${crossOps}
    </div>
  `;

function renderProjectDetail(p) {
  if (!p) return '';

  return `
    <div class="detail-panel">

        <span class="title">${esc(p.name)} <span style="color:var(--text-3);font-size:11px;margin-left:8px;">${esc(p.id)}</span></span>
        <div style="display:flex;gap:6px;align-items:center;">

      </div>

        <div class="kv" style="margin-bottom:14px;">

          <span class="k">name</span><span class="v">${esc(p.name)}</span>
          <span class="k">type</span><span class="v">${Badge(typeLabel[p.type] || p.type, p.type === 'github' ? 'blue' : p.type === 'api' ? 'orange' : 'gray')}</span>
          <span class="k">url</span><span class="v">${esc(p.url)}</span>

          <span class="k">last_sync</span><span class="v">${esc(p.last_sync)}</span>
        </div>
        <div class="project-detail-row">
          <span style="font-size:12px;color:var(--text-2);">资产类型:</span>
          <select class="select" style="width:auto;" id="syncAssetType_${p.id}" onchange="hubState.syncAssetType = this.value">
            ${[['all', '全部'], ['skills', '技能'], ['memory', '记忆'], ['profile', '画像']].map(([v, l]) => `<option value="${v}" ${hubState.syncAssetType === v ? 'selected' : ''}>${l}</option>`).join('')}
          </select>
          <button class="btn primary sm" onclick="syncProjectAssets('${p.id}')">同步资产</button>

function setPrjType(t) { hubState.newPrjType = t; drawHub(); }
function selectProject(id) {
  hubState.selectedProject = (hubState.selectedProject === id || id === null) ? null : id;
  drawHub();
}

async function pingProject(id) {
  try {
    const r = await api(`/projects/${encodeURIComponent(id)}/health`);
    const p = projectsData.find(x => x.id === id);
    if (p) {
      p.status = r.status || (r.reachable ? 'connected' : 'error');
      p.latency_ms = r.latency_ms;
    }
    if (r.reachable) {
      toast(`连接正常 · 延迟 ${r.latency_ms}ms`, 'success');
    } else {
      toast(`连接异常: ${r.error || '不可达'}`, 'error');
    }
    drawHub();
  } catch (e) {
    toast(`检测失败: ${e.message || e}`, 'error');
  }
}

async function addProject() {
  const name = hubState.newPrjName.trim();
  if (!name) { toast('请填写项目名称', 'error'); return; }
  if (!hubState.newPrjUrl.trim()) { toast('请填写 URL', 'error'); return; }
  const body = { name, type: hubState.newPrjType, url: hubState.newPrjUrl, token: hubState.newPrjToken || undefined };

  try {
    const p = await api('/projects', { method: 'POST', body });
    projectsData.unshift(p);
    resetPrjForm();
    toast('项目 ' + name + ' 已接入', 'success');
    drawHub();
  } catch (e) {
    toast('接入失败: ' + (e.message || e), 'error');
  }
}

function resetPrjForm() {
  hubState.newPrjName = '';
  hubState.newPrjType = 'filesystem';
  hubState.newPrjUrl = '';
  hubState.newPrjToken = '';
}

async function syncProjectAssets(id) {
  const p = projectsData.find(x => x.id === id);
  if (!p) return;
  const assetType = hubState.syncAssetType;
  const assetLabel = { all: '全部资产', skills: '技能', memory: '记忆', profile: '画像' }[assetType] || assetType;
  toast('正在同步 ' + p.name + ' 的' + assetLabel + '...', 'info');
  try {
    const r = await api(`/projects/${encodeURIComponent(id)}/sync`, {
      method: 'POST',
      body: { asset_type: assetType }
    });
    const ok = r.ok !== false;
    const synced = r.results ? r.results.filter(x => x.ok).length : 0;
    const errors = r.results ? r.results.filter(x => !x.ok).length : 0;
    p.last_sync = new Date().toISOString();
    if (assetType === 'all' || assetType === 'skills') p.skills_count += synced;
    toast(`${assetLabel}同步${ok ? '完成' : '部分失败'}: ${synced} 成功 / ${errors} 错误`, ok ? 'success' : 'error');
    drawHub();
  } catch (e) {
    toast(`同步失败: ${e.message || e}`, 'error');
  }
}

async function disconnectProject(id) {
  const p = projectsData.find(x => x.id === id);
  if (!p) return;
  try {
    const res = await fetch(`/projects/${id}`, { method: 'DELETE', headers: authHeaders() });
    if (res.ok) { /* ok */ }
  } catch (e) { /* ignore */ }
  projectsData = projectsData.filter(x => x.id !== id);
  if (hubState.selectedProject === id) hubState.selectedProject = null;
  toast('项目 ' + p.name + ' 已断开', 'info');

async function crossMergeProfiles() {
  const connected = projectsData.filter(p => p.status === 'connected');
  if (connected.length < 1) { toast('至少需要 1 个已连接项目', 'error'); return; }
  let totalSynced = 0, totalErrors = 0, allOk = true;
  for (const p of connected) {
    try {
      const r = await api(`/projects/${encodeURIComponent(p.id)}/sync`, {
        method: 'POST',
        body: { asset_type: 'profile' }
      });
      if (r.ok === false) allOk = false;
      totalSynced += r.results ? r.results.filter(x => x.ok).length : 0;
      totalErrors += r.results ? r.results.filter(x => !x.ok).length : 0;
    } catch (e) { allOk = false; totalErrors++; }
  }
  toast(`画像合并${allOk ? '完成' : '部分失败'}: ${totalSynced} 成功 / ${totalErrors} 错误`, allOk ? 'success' : 'error');
}

const paletteCommands = [
  { label: '概览', desc: '仪表盘首页', ico: '◈', route: 'overview' },
  { label: '技能', desc: '浏览和运行技能', ico: '▤', route: 'skills' },
  { label: '记忆', desc: '事实、事件、画像', ico: '⚡', route: 'memory' },
  { label: '任务', desc: '调度和监控任务', ico: '☑', route: 'tasks' },
  { label: '注册中心', desc: '数据源、智能体、知识文档', ico: '🔗', route: 'registry' },
  { label: '用户画像', desc: '用户偏好设置', ico: '⚙', route: 'profile' },

  { label: '项目调度中心', desc: 'Phase 3 · 多项目接入与跨项目同步', ico: '📡', route: 'hub' },
  { label: '审计日志', desc: '查看 API 操作记录与统计', ico: '📋', route: 'audit' },
  { label: '刷新', desc: '重新加载当前页面', ico: '↻', action: () => render(currentRoute) }
];

let paletteIdx = 0;
function openPalette() {
  $('#paletteRoot').classList.add('open');
  $('#paletteInput').value = '';
  paletteIdx = 0;
  drawPalette('');
  setTimeout(() => $('#paletteInput').focus(), 20);
}
function closePalette() { $('#paletteRoot').classList.remove('open'); }
function drawPalette(q) {
  q = q.toLowerCase();
  const filtered = paletteCommands.filter(c => !q || c.label.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q));
  if (!filtered.length) { $('#paletteList').innerHTML = `<div class="pal-empty">没有匹配的命令</div>`; return; }
  if (paletteIdx >= filtered.length) paletteIdx = filtered.length - 1;
  $('#paletteList').innerHTML = filtered.map((c, i) => `
    <div class="pal-item ${i === paletteIdx ? 'active' : ''}" onclick="runPalette(${i})" data-idx="${i}">
      <span class="ico">${c.ico}</span>
      <span>${esc(c.label)}</span>
      <span class="desc">${esc(c.desc)}</span>
    </div>
  `).join('');
  // store filtered for runner
  $('#paletteList').dataset.filtered = JSON.stringify(filtered.map(c => ({ label: c.label, route: c.route || null, hasAction: !!c.action })));
}
function runPalette(i) {
  const data = JSON.parse($('#paletteList').dataset.filtered || '[]');
  const c = data[i];
  if (!c) return;
  closePalette();
  if (c.route) location.hash = '#/' + c.route;
  else {
    const cmd = paletteCommands.find(x => x.label === c.label);
    if (cmd && cmd.action) cmd.action();
  }
}

$('#paletteInput').addEventListener('input', (e) => drawPalette(e.target.value));
$('#paletteInput').addEventListener('keydown', (e) => {
  const data = JSON.parse($('#paletteList').dataset.filtered || '[]');
  if (e.key === 'ArrowDown') { e.preventDefault(); paletteIdx = Math.min(paletteIdx + 1, data.length - 1); drawPalette($('#paletteInput').value); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); paletteIdx = Math.max(paletteIdx - 1, 0); drawPalette($('#paletteInput').value); }
  else if (e.key === 'Enter') { e.preventDefault(); runPalette(paletteIdx); }
  else if (e.key === 'Escape') { closePalette(); }
});

});

/* ============================================================
 * Page: Audit Log (审计日志)
 * ============================================================ */
const auditState = { limit: 50, method: '', path: '', minStatus: '' };

async function renderAudit() {
  const content = $('#content');
  content.innerHTML = `<div class="page">${Skeleton(3)}</div>`;
  try {
    const params = new URLSearchParams();
    params.set('limit', auditState.limit);
    if (auditState.method) params.set('method', auditState.method);
    if (auditState.path) params.set('path', auditState.path);
    if (auditState.minStatus) params.set('min_status', auditState.minStatus);

    const [auditData, statsData] = await Promise.all([
      api(`/audit?${params.toString()}`),
      api('/audit/stats')
    ]);

    const entries = auditData.entries || [];
    const stats = statsData || {};

    const methodOptions = ['', 'GET', 'POST', 'PUT', 'DELETE', 'PATCH'];
    const statusOptions = [
      {v: '', l: '全部状态'},
      {v: '200', l: '2xx 成功'},
      {v: '400', l: '4xx 客户端错误'},
      {v: '500', l: '5xx 服务端错误'}
    ];

    const statCards = [
      { val: stats.total || 0, label: '总请求数', ico: '📊' },
      { val: stats.errors || 0, label: '错误数', ico: '✕' },
      { val: ((stats.error_rate || 0) * 100).toFixed(1) + '%', label: '错误率', ico: '⚠' },
      { val: (stats.avg_duration_ms || 0) + 'ms', label: '平均耗时', ico: '⏱' }
    ].map(s => `
      <div class="card stat">
        <div class="stat-top"><div class="stat-ico">${s.ico}</div></div>
        <div class="stat-val">${s.val}</div>
        <div class="stat-label">${s.label}</div>
      </div>
    `).join('');

    const tableRows = entries.length ? entries.map(e => {
      const statusClass = e.status < 300 ? 'green' : e.status < 400 ? 'blue' : e.status < 500 ? 'orange' : 'red';
      const time = new Date(e.timestamp * 1000).toLocaleTimeString('zh-CN', { hour12: false });
      return `
        <tr>
          <td style="font-family:var(--mono);font-size:11px;color:var(--text-3);">${time}</td>
          <td><span class="badge ${e.method === 'GET' ? 'blue' : e.method === 'POST' ? 'green' : e.method === 'DELETE' ? 'red' : 'orange'}" style="font-size:10px;">${e.method}</span></td>
          <td style="font-family:var(--mono);font-size:11px;">${esc(e.path)}</td>
          <td><span class="badge ${statusClass}" style="font-size:10px;">${e.status}</span></td>
          <td style="font-family:var(--mono);font-size:11px;color:var(--text-2);">${e.duration_ms}ms</td>
          <td style="font-size:11px;color:var(--text-3);">${esc(e.client_ip || '-')}</td>
          <td style="font-size:11px;color:var(--red);">${e.error ? esc(e.error.substring(0, 50)) : '-'}</td>
        </tr>
      `;
    }).join('') : `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-3);">暂无审计记录</td></tr>`;

    content.innerHTML = `
      <div class="page">
        <div class="page-header" style="margin-bottom:16px;">
          <h1 style="margin:0;">审计日志</h1>
          <div style="display:flex;gap:8px;">
            <button class="btn" onclick="refreshAudit()">刷新</button>
            <button class="btn danger" onclick="clearAudit()">清空日志</button>
          </div>
        </div>

        <div class="grid grid-4" style="margin-bottom:16px;">
          ${statCards}
        </div>

        <div class="card" style="margin-bottom:16px;">
          <div class="card-title">过滤</div>
          <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:end;">
            <div class="field" style="margin:0;min-width:120px;">
              <label style="font-size:11px;">方法</label>
              <select class="input" onchange="auditState.method=this.value;renderAudit()">
                ${methodOptions.map(m => `<option value="${m}" ${m === auditState.method ? 'selected' : ''}>${m || '全部'}</option>`).join('')}
              </select>
            </div>
            <div class="field" style="margin:0;min-width:150px;flex:1;">
              <label style="font-size:11px;">路径前缀</label>
              <input class="input" placeholder="/workflows, /triggers..." value="${esc(auditState.path)}" oninput="auditState.path=this.value" onkeyup="if(event.key==='Enter')renderAudit()" />
            </div>
            <div class="field" style="margin:0;min-width:120px;">
              <label style="font-size:11px;">状态码</label>
              <select class="input" onchange="auditState.minStatus=this.value;renderAudit()">
                ${statusOptions.map(s => `<option value="${s.v}" ${s.v === auditState.minStatus ? 'selected' : ''}>${s.l}</option>`).join('')}
              </select>
            </div>
            <div class="field" style="margin:0;min-width:80px;">
              <label style="font-size:11px;">条数</label>
              <select class="input" onchange="auditState.limit=parseInt(this.value);renderAudit()">
                ${[20, 50, 100, 200].map(n => `<option value="${n}" ${n === auditState.limit ? 'selected' : ''}>${n}</option>`).join('')}
              </select>
            </div>
            <button class="btn primary" onclick="renderAudit()">查询</button>
          </div>
        </div>

        <div class="card">
          <div class="card-title">操作记录 (${entries.length} 条)</div>
          <table style="width:100%;border-collapse:collapse;font-size:12px;">
            <thead>
              <tr style="border-bottom:1px solid var(--border);text-align:left;color:var(--text-2);">
                <th style="padding:8px;">时间</th>
                <th style="padding:8px;">方法</th>
                <th style="padding:8px;">路径</th>
                <th style="padding:8px;">状态</th>
                <th style="padding:8px;">耗时</th>
                <th style="padding:8px;">来源</th>
                <th style="padding:8px;">错误</th>
              </tr>
            </thead>
            <tbody>${tableRows}</tbody>
          </table>
        </div>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="page">${ErrorState('审计日志加载失败: ' + e.message, 'renderAudit()')}</div>`;
  }
}

function refreshAudit() { renderAudit(); }

  if (!confirm('确定要清空所有审计日志吗？此操作不可撤销。')) return;
