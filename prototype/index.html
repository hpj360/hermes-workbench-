/* ============================================================
 * SSE 实时事件流
 * ============================================================ */
let sseSource = null;
let sseConnected = false;
const liveExecutions = {}; // execution_id -> { steps: [], status, workflow_name }

function setConnState(state, label) {
  const badge = $('#connBadge');
  const text = $('#connText');
  badge.classList.remove('demo', 'live', 'error');
  if (state === 'live') badge.classList.add('live');
  else if (state === 'error') badge.classList.add('error');
  else badge.classList.add('demo');
  if (label) text.textContent = label;
}

function connectSSE() {
  if (DEMO_MODE) { setConnState('demo', '演示模式'); return; }
  if (sseSource) { try { sseSource.close(); } catch (e) {} }
  try {
    sseSource = new EventSource('/events');
    sseSource.addEventListener('connected', (e) => {
      sseConnected = true;
      setConnState('live', '实时连接');
    });
    sseSource.addEventListener('heartbeat', () => {
      if (!sseConnected) { sseConnected = true; setConnState('live', '实时连接'); }
    });
    sseSource.addEventListener('workflow.started', (e) => {
      try {
        const payload = JSON.parse(e.data);
        liveExecutions[payload.data.execution_id] = {
          workflow_id: payload.data.workflow_id,
          workflow_name: payload.data.workflow_name,
          total_steps: payload.data.total_steps || 0,
          completed_steps: 0,
          status: 'RUNNING',
          steps: []
        };
        toast(`▶ 工作流 "${payload.data.workflow_name}" 开始执行`, 'info');
        updateLiveExecBadge();
      } catch (err) {}
    });
    sseSource.addEventListener('workflow.step.completed', (e) => {
      try {
        const payload = JSON.parse(e.data);
        const ex = liveExecutions[payload.data.execution_id];
        if (ex) {
          ex.completed_steps++;
          ex.steps.push({
            step_id: payload.data.step_id,
            skill: payload.data.skill,
            ok: payload.data.ok,
            duration: payload.data.duration
          });
          updateLiveExecBadge();
        }
      } catch (err) {}
    });
    sseSource.addEventListener('workflow.completed', (e) => {
      try {
        const payload = JSON.parse(e.data);
        const ex = liveExecutions[payload.data.execution_id];
        if (ex) {
          ex.status = payload.data.status;
          ex.duration = payload.data.duration;
        }
        const status = payload.data.status;
        const name = ex ? ex.workflow_name : payload.data.workflow_id;
        if (status === 'COMPLETED') {
          toast(`✓ 工作流 "${name}" 执行完成`, 'success');
        } else {
          toast(`✕ 工作流 "${name}" 执行失败: ${payload.data.error || ''}`, 'error');
        }
        // 延迟清理并在编排页刷新执行历史
        setTimeout(() => {
          delete liveExecutions[payload.data.execution_id];
          updateLiveExecBadge();
          if (currentRoute === 'orchestrate') renderOrchestrate();
        }, 2000);
      } catch (err) {}
    });
    sseSource.addEventListener('trigger.fired', (e) => {
      try {
        const payload = JSON.parse(e.data);
        toast(`⚡ 触发器 ${payload.data.trigger_id} 已激活 (${payload.data.trigger_type})`, 'info');
      } catch (err) {}
    });
    sseSource.addEventListener('trigger.completed', (e) => {
      try {
        const payload = JSON.parse(e.data);
        const ok = payload.data.status === 'COMPLETED';
        toast(`${ok ? '✓' : '✕'} 触发器执行${ok ? '完成' : '失败'}: ${payload.data.trigger_id}`, ok ? 'success' : 'error');
        if (currentRoute === 'orchestrate') renderOrchestrate();
      } catch (err) {}
    });
    sseSource.addEventListener('trigger.failed', (e) => {
      try {
        const payload = JSON.parse(e.data);
        toast(`✕ 触发器失败: ${payload.data.error || ''}`, 'error');
      } catch (err) {}
    });
    sseSource.onerror = () => {
      sseConnected = false;
      setConnState('error', '连接断开');
      // 5 秒后自动重连
      setTimeout(() => { if (sseSource) connectSSE(); }, 5000);
    };
  } catch (e) {
    setConnState('demo', '演示模式');
  }
}

function updateLiveExecBadge() {
  // 在顶栏显示活跃执行数（如果有）
  const count = Object.keys(liveExecutions).length;
  let badge = $('#liveExecBadge');
  if (!badge) {
    badge = el('div', 'conn live');
    badge.id = 'liveExecBadge';
    badge.style.display = 'none';
    $('.topbar').insertBefore(badge, $('#connBadge'));
  }
  if (count > 0) {
    badge.style.display = 'flex';
    badge.innerHTML = `<span class="dot" style="background:var(--accent);box-shadow:0 0 8px rgba(99,102,241,0.6);"></span><span>${count} 执行中</span>`;
  } else {
    badge.style.display = 'none';
  }
}
